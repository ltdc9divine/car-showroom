<!-- Quick Model Finder - Browser Console Script -->
<!-- Mở DevTools (F12) trên trang https://sketchfab.com và chạy script này -->

<script>
// ========================================
// Sketchfab Model URL Finder
// ========================================
// Paste script này vào browser console (F12)
// để tìm kiếm và lấy đường dẫn GLB của các model

const cars = [
  'Lamborghini Aventador SVJ',
  'Ferrari SF90 Stradale', 
  'Bugatti Chiron Super Sport',
  'Porsche 911 GT3 RS',
  'McLaren P1',
  'Rolls-Royce Spectre',
  'Aston Martin Valkyrie',
  'Mercedes-AMG One',
  'Lamborghini Huracan STO',
  'Ferrari 296 GTB',
  'Porsche Taycan Turbo S',
  'McLaren 720S'
];

const SKETCHFAB_API = 'https://api.sketchfab.com/v3';

async function searchCarModel(carName) {
  try {
    const query = encodeURIComponent(carName);
    const url = `${SKETCHFAB_API}/search?q=${query}&type=models&downloadable=true&limit=5`;
    
    const response = await fetch(url);
    const data = await response.json();
    
    if (data.results && data.results.length > 0) {
      const model = data.results[0];
      return {
        carName,
        modelName: model.name,
        modelUrl: `https://sketchfab.com/models/${model.uid}`,
        author: model.user.username,
        thumbnailUrl: model.thumbnailUrl,
        uid: model.uid,
      };
    }
    return null;
  } catch (error) {
    console.error(`Error searching for ${carName}:`, error);
    return null;
  }
}

async function findAllModels() {
  console.log('🔍 Tìm kiếm các model 3D...\n');
  const results = {};
  
  for (const car of cars) {
    const result = await searchCarModel(car);
    if (result) {
      results[car] = result.modelUrl;
      console.log(`✅ ${car}`);
      console.log(`   Model: ${result.modelName}`);
      console.log(`   Author: ${result.author}`);
      console.log(`   Link: ${result.modelUrl}\n`);
    } else {
      console.log(`❌ ${car} - Không tìm thấy\n`);
    }
    
    // Delay 500ms để tránh rate limiting
    await new Promise(resolve => setTimeout(resolve, 500));
  }
  
  // Output code cho car-models.ts
  console.log('\n========================================');
  console.log('📋 COPY CODE DỮ LIỆU CHO car-models.ts');
  console.log('========================================\n');
  
  let code = 'export const CAR_3D_MODELS: Record<string, string> = {\n';
  for (const [car, url] of Object.entries(results)) {
    code += `  '${car}': '${url}',\n`;
  }
  code += '};\n';
  
  console.log(code);
  console.log('\nCopy đoạn code trên và dán vào src/lib/car-models.ts');
}

// Chạy
findAllModels();
</script>
